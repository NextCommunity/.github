steps:
  - name: "Build container image"
    id: "build"
    entrypoint: "docker"
    args: [
      "build",
      "-t", "gcr.io/$PROJECT_ID/nextcommunity-leaderboard",
      "-f", "backend/Dockerfile",
      "."
    ]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/nextcommunity-leaderboard"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "nextcommunity-leaderboard"
      - "--image"
      - "gcr.io/$PROJECT_ID/nextcommunity-leaderboard"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8000"

images:
  - "gcr.io/$PROJECT_ID/nextcommunity-leaderboard"
