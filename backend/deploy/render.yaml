services:
  - type: web
    name: nextcommunity-leaderboard-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: ORG_NAME
        value: NextCommunity
      - key: CACHE_TTL
        value: "900"
      - key: API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.13"
